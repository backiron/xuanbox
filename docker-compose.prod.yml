services:
  xuanbox-postgres:
    image: postgres:16-alpine
    container_name: xuanbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xuanbox}
      POSTGRES_USER: ${POSTGRES_USER:-xuanbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - xuanbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xuanbox} -d ${POSTGRES_DB:-xuanbox}"]
      interval: 5s
      timeout: 5s
      retries: 10

  xuanbox-redis:
    image: redis:7-alpine
    container_name: xuanbox-redis
    restart: unless-stopped
    volumes:
      - xuanbox-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  xuanbox-api:
    build:
      context: ./backend
    container_name: xuanbox-api
    restart: unless-stopped
    depends_on:
      xuanbox-postgres:
        condition: service_healthy
      xuanbox-redis:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-false}
      POSTGRES_HOST: xuanbox-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-xuanbox}
      POSTGRES_USER: ${POSTGRES_USER:-xuanbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://xuanbox-redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      STORAGE_ROOT: /data/xuanbox/storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:15173}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      RECEIPT_AI_ASSIST_ENABLED: ${RECEIPT_AI_ASSIST_ENABLED:-true}
      RECEIPT_AI_BASE_URL: ${RECEIPT_AI_BASE_URL:-http://host.docker.internal:11434}
      RECEIPT_AI_MODEL: ${RECEIPT_AI_MODEL:-qwen2.5:3b}
      DOCUMENT_AI_ENABLED: ${DOCUMENT_AI_ENABLED:-true}
      DOCUMENT_AI_BASE_URL: ${DOCUMENT_AI_BASE_URL:-http://host.docker.internal:11434}
      DOCUMENT_AI_MODEL: ${DOCUMENT_AI_MODEL:-qwen2.5:3b}
      DOCUMENT_AI_CONCURRENCY: ${DOCUMENT_AI_CONCURRENCY:-1}
      BACKUP_SCHEDULE_HOURS: ${BACKUP_SCHEDULE_HOURS:-24}
    ports:
      - "${API_PORT:-18080}:8000"
    volumes:
      - ./data/storage:/data/xuanbox/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  xuanbox-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_DROP_PUBLIC_ORIGIN: ${DROP_PUBLIC_ORIGIN:-}
    container_name: xuanbox-web
    restart: unless-stopped
    depends_on:
      xuanbox-api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-15173}:80"

  xuanbox-worker:
    build:
      context: ./backend
    container_name: xuanbox-worker
    restart: unless-stopped
    depends_on:
      xuanbox-api:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-false}
      POSTGRES_HOST: xuanbox-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-xuanbox}
      POSTGRES_USER: ${POSTGRES_USER:-xuanbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://xuanbox-redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      STORAGE_ROOT: /data/xuanbox/storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:15173}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      RECEIPT_AI_ASSIST_ENABLED: ${RECEIPT_AI_ASSIST_ENABLED:-true}
      RECEIPT_AI_BASE_URL: ${RECEIPT_AI_BASE_URL:-http://host.docker.internal:11434}
      RECEIPT_AI_MODEL: ${RECEIPT_AI_MODEL:-qwen2.5:3b}
      DOCUMENT_AI_ENABLED: ${DOCUMENT_AI_ENABLED:-true}
      DOCUMENT_AI_BASE_URL: ${DOCUMENT_AI_BASE_URL:-http://host.docker.internal:11434}
      DOCUMENT_AI_MODEL: ${DOCUMENT_AI_MODEL:-qwen2.5:3b}
      DOCUMENT_AI_CONCURRENCY: ${DOCUMENT_AI_CONCURRENCY:-1}
      BACKUP_SCHEDULE_HOURS: ${BACKUP_SCHEDULE_HOURS:-24}
    volumes:
      - ./data/storage:/data/xuanbox/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.workers.ocr_worker

volumes:
  xuanbox-postgres-data:
  xuanbox-redis-data:
